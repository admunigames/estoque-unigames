<style>
  :root{

  *{box-sizing:border-box;}
  [hidden]{display:none !important;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:var(--sans); -webkit-font-smoothing:antialiased;
    font-size:15px;
    background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 18px 18px; text-transform:uppercase; overscroll-behavior-y:none;
  }
  button, input, select, option{ text-transform:uppercase; -webkit-tap-highlight-color:transparent; }
  .wrap{max-width:1680px; margin:0 auto; padding:36px 32px calc(76px + env(safe-area-inset-bottom));}

  /* SHELL / MENU LATERAL */
  body.menu-open{overflow:hidden;}
  .shell{min-height:100vh;}
  .sidebar{
    width:min(300px, calc(100vw - 48px));
    background:
      linear-gradient(rgba(79,134,189,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,134,189,0.045) 1px, transparent 1px),
      radial-gradient(circle at 12% 4%, rgba(79,134,189,0.2), transparent 34%),
      linear-gradient(160deg, #12243a 0%, #08121e 72%);
    background-size:24px 24px, 24px 24px, auto, auto;
    border-right:1px solid rgba(79,134,189,0.48);
    padding:calc(26px + env(safe-area-inset-top)) 18px calc(26px + env(safe-area-inset-bottom)); display:flex; flex-direction:column; gap:6px;
    position:fixed; inset:0 auto 0 0; height:100vh; overflow-y:auto; z-index:1000;
    transform:translateX(-102%); visibility:hidden;
    box-shadow:24px 0 64px rgba(0,0,0,0.52), inset -1px 0 rgba(79,134,189,0.12);
    transition:transform .24s ease, visibility 0s linear .24s;
  }
  .sidebar::before{
    content:''; position:absolute; inset:0 0 auto; height:2px;
    background:linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow:0 0 18px rgba(79,134,189,0.75); pointer-events:none;
  }
  .sidebar::after{
    content:''; position:absolute; top:0; right:0; width:1px; height:100%;
    background:linear-gradient(transparent, var(--accent), transparent); opacity:.45; pointer-events:none;
  }
  body.menu-open .sidebar{transform:translateX(0); visibility:visible; transition-delay:0s;}
  .sidebar-brand{
    display:flex; align-items:center; gap:12px; position:relative;
    font-family:var(--mono); color:var(--ink); margin:48px 0 24px; padding:12px;
    background:rgba(255,255,255,0.025); border:1px solid rgba(79,134,189,0.28); border-radius:12px;

  .brand-logo{
    width:44px; height:44px; flex:0 0 44px; object-fit:contain; padding:2px;

  .brand-copy small{color:var(--ink-soft); font-family:var(--mono); font-size:8.5px; letter-spacing:1.1px; margin-top:3px;}
  .nav-item{
    display:flex; align-items:center; gap:11px; position:relative; overflow:hidden;
    background:rgba(255,255,255,0.015); border:1px solid transparent; color:var(--ink-soft);
    text-align:left; padding:11px 12px; border-radius:9px; font-size:12px; font-weight:700;
    cursor:pointer; width:100%; font-family:var(--mono); letter-spacing:.35px;
  }
  .nav-item:hover{background:rgba(79,134,189,0.12); border-color:rgba(79,134,189,0.3); color:var(--ink); opacity:1;}
  .nav-item.active{
    background:linear-gradient(90deg, rgba(29,72,126,0.98), rgba(79,134,189,0.9));
    border-color:var(--accent); color:var(--accent-ink);
    box-shadow:0 0 24px rgba(79,134,189,0.24), inset 0 1px rgba(255,255,255,0.22);

  .nav-divider{height:1px; background:var(--border); margin:14px 6px;}
  .nav-group{display:flex; flex-direction:column; gap:5px;}
  .nav-group-toggle{
    display:flex; align-items:center; justify-content:space-between; width:100%; padding:9px 12px;
    border:0; background:transparent; color:var(--ink-soft); font-family:var(--mono);
    font-size:10.5px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase;
  }
  .nav-group-toggle:hover{opacity:1; color:var(--ink); background:var(--bg-card-2);}
  .nav-group-toggle.active{
    color:var(--accent-ink); border:1px solid var(--accent);
    background:linear-gradient(90deg,rgba(29,72,126,.98),rgba(79,134,189,.9));
    box-shadow:0 0 24px rgba(79,134,189,.24),inset 0 1px rgba(255,255,255,.22);
  }
  .nav-group-chevron{font-size:13px; transition:transform .18s ease;}
  .nav-group-toggle[aria-expanded="false"] .nav-group-chevron{transform:rotate(-90deg);}
  .nav-submenu{display:flex; flex-direction:column; gap:4px;}
  .nav-submenu[hidden]{display:none;}
  .nav-item.sub-item{position:relative; padding-left:30px;}
  .nav-item.sub-item::before{
    content:''; position:absolute; left:14px; top:50%; width:5px; height:5px; border-radius:50%;

    color:var(--ink-soft); font-family:var(--mono); font-size:9px; letter-spacing:.7px;
  }
  .logout-form{margin-top:12px;}

    border:1px solid rgba(255,116,116,.3); background:rgba(126,28,28,.12);
    color:#ffc4c4; font-family:var(--mono); font-size:10px; font-weight:800;
    letter-spacing:.55px; text-align:left;
  }
  .logout-button:hover{border-color:rgba(255,116,116,.65); background:rgba(126,28,28,.24);}
  .ios-storage-box{
    margin-top:auto; padding:12px; border:1px solid rgba(79,134,189,.34); border-radius:11px;
    background:rgba(8,18,30,.58); box-shadow:inset 0 1px rgba(255,255,255,.035);

  .ios-storage-box p{margin:5px 0 10px; color:var(--ink-soft); font:9px/1.45 var(--mono);}
  .ios-storage-actions{display:grid; grid-template-columns:1fr 1fr; gap:7px;}

  .ios-install-hint{

    background:rgba(16,29,43,.97); box-shadow:0 18px 46px rgba(0,0,0,.48); color:var(--ink-soft);

    box-shadow:0 0 0 4px rgba(84,196,138,0.09), 0 0 12px rgba(84,196,138,0.7);
  }
  .menu-toggle{
    position:fixed; top:calc(16px + env(safe-area-inset-top)); left:calc(16px + env(safe-area-inset-left)); z-index:1100; width:44px; height:44px;
    display:grid; place-items:center; padding:0; border:1px solid var(--border); border-radius:11px;
    background:linear-gradient(145deg, #20262b, #14181c); color:var(--ink);
    box-shadow:0 8px 22px rgba(0,0,0,0.36), 0 0 0 1px rgba(79,134,189,0.1);

  .menu-toggle-icon{display:flex; flex-direction:column; gap:4px; width:18px;}

    display:block; width:100%; height:2px; border-radius:2px; background:currentColor;
    transform-origin:center; transition:transform .2s ease, opacity .2s ease;
  }

  body.menu-open .menu-toggle-icon span:nth-child(2){opacity:0;}
  body.menu-open .menu-toggle-icon span:nth-child(3){transform:translateY(-6px) rotate(-45deg);}
  body.home-active .menu-toggle{display:none;}
  .sidebar-backdrop{
    position:fixed; inset:0; z-index:900; padding:0; border:0; border-radius:0;
    background:rgba(5,7,9,0.68); opacity:0; visibility:hidden; pointer-events:none;
    transition:opacity .24s ease, visibility 0s linear .24s;
  }
  body.menu-open .sidebar-backdrop{opacity:1; visibility:visible; pointer-events:auto; transition-delay:0s;}
  .content{width:100%; min-width:0;}
  .page{display:none;}
  .page.active{display:block;}

    background:

  }

  }
  .page-logo:hover{
    opacity:1; transform:translateY(-2px) scale(1.02); border-color:rgba(157,207,252,.92);

  }
  .page-logo:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .page-logo .brand-logo{width:100%; height:100%; object-fit:contain; border-radius:11px; padding:1px; background:rgba(255,255,255,.96);}
  .page-desc{font-size:15px; color:var(--ink-soft); margin:-8px 0 26px; line-height:1.6;}

  /* INÍCIO / CENTRAL LIGHTGLASS */

          '<div class="purchase-card-field '+forecastClass+'"><span>PREVISÃO</span><strong>'+purchaseDate(item.previsao)+'</strong>'+(forecastClass ? '<small>ATRASADO</small>' : '')+'</div>'+
          '<div class="purchase-card-field"><span>RECEBIMENTO</span><strong>'+purchaseDate(item.dataRecebimento)+'</strong></div>'+
        '</div>'+
        '<div class="purchase-card-details">'+
          '<div class="purchase-card-detail wide"><span>RESPONSÁVEL</span><strong>'+escapeHtml(responsible)+'</strong></div>'+
          '<div class="purchase-card-detail"><span>MOV. SISTEMA</span><strong>'+purchaseDate(item.movimentacaoSistema)+'</strong></div>'+
          '<div class="purchase-card-detail"><span>STATUS DA DIVISÃO</span>'+purchaseStatusHtml(item.statusDivisao)+'</div>'+
        '</div>'+
        '<div class="purchase-card-section"><span>DIVISÃO</span>'+purchaseDivisionHtml(item.divisao)+'</div>'+
        '<div class="purchase-card-section"><span>ARQUIVOS</span>'+purchaseFilesHtml(item)+'</div>'+
        '<footer class="purchase-card-footer"><div class="purchase-card-actions">'+
          '<button class="btn-outline" type="button" data-edit-purchase="'+escapeHtml(item.id)+'">EDITAR</button>'+
          '<a class="btn-outline" href="'+escapeHtml(item.url || '#')+'" target="_blank" rel="noopener noreferrer">NOTION ↗</a>'+
        '</div></footer>'+
      '</article>';
    }).join('');
  }

  async function loadPurchases(reset){
    if(purchasesLoading) return;
    purchasesLoading = true;
    if(reset){
      purchaseRows = [];
      purchaseCursor = null;
      renderPurchaseCards();
    }
    setPurchaseSync('SINCRONIZANDO COM O NOTION...', 'loading');
    el('btnPurchasesRefresh').disabled = true;
    el('btnPurchasesMore').disabled = true;
    try{
      const params = new URLSearchParams();
      const query = el('purchaseSearch').value.trim();
      const statuses = selectedPurchaseStatuses();
      if(query) params.set('query', query);
      statuses.forEach(status => params.append('status', status));
      if(!reset && purchaseCursor) params.set('cursor', purchaseCursor);
      const response = await fetch('/api/compras?'+params.toString(), {headers:{'Accept':'application/json'}});
      const data = await response.json();
      if(!response.ok) throw new Error(data.error || 'NÃO FOI POSSÍVEL CONSULTAR O NOTION.');
      purchaseRows = reset ? (data.items || []) : purchaseRows.concat(data.items || []);
      purchaseCursor = data.nextCursor || null;
      purchasesLoaded = true;
      renderPurchaseCards();
      setPurchaseSync('SINCRONIZADO COM O NOTION · '+purchaseRows.length.toLocaleString('pt-BR')+' PEDIDOS CARREGADOS', 'ready');
    } catch(error){
      purchasesLoaded = false;
      renderPurchaseCards();
      setPurchaseSync(error && error.message ? error.message : 'FALHA NA CONEXÃO COM O NOTION.', 'error');
    } finally {
      purchasesLoading = false;
      el('btnPurchasesRefresh').disabled = false;
      el('btnPurchasesMore').disabled = false;
    }
  }

  async function loadNotionUsers(){
    if(notionUsersLoaded) return;
    const select = el('purchaseResponsible');
    try{
      const response = await fetch('/api/compras/users', {headers:{'Accept':'application/json'}});
      const data = await response.json();
      if(!response.ok) throw new Error(data.error || 'USUÁRIOS INDISPONÍVEIS');
      select.innerHTML = '<option value="">SEM RESPONSÁVEL</option>' + (data.users || []).map(user =>
        '<option value="'+escapeHtml(user.id)+'">'+escapeHtml(user.name || user.email || 'USUÁRIO NOTION')+'</option>'
      ).join('');
      notionUsersLoaded = true;
    } catch(error){
      select.innerHTML = '<option value="">SEM RESPONSÁVEL</option>';
    }
  }

  async function openPurchaseDialog(item){
    await loadNotionUsers();
    el('purchaseForm').reset();
    el('purchasePageId').value = item ? item.id : '';
    el('purchaseDialogTitle').textContent = item ? 'EDITAR PEDIDO' : 'NOVO PEDIDO';
    el('purchaseSupplier').value = item ? (item.fornecedor || '') : '';
    el('purchaseStore').value = item ? (item.loja || '') : '';
    el('purchaseOrderDate').value = item ? purchaseDateInput(item.dataPedido) : new Date().toISOString().slice(0,10);
    el('purchaseForecast').value = item ? purchaseDateInput(item.previsao) : '';
    el('purchaseReceivedDate').value = item ? purchaseDateInput(item.dataRecebimento) : '';
    el('purchaseSystemDate').value = item ? purchaseDateInput(item.movimentacaoSistema) : '';
    el('purchaseDivision').value = item ? (item.divisao || '') : '';
    el('purchaseDivisionStatus').value = item ? (item.statusDivisao || '') : '';
    el('purchaseStatus').value = item && item.status ? item.status : 'Não iniciado';
    const responsibleId = item && Array.isArray(item.responsaveis) && item.responsaveis[0] ? item.responsaveis[0].id : '';
    el('purchaseResponsible').value = responsibleId;
    el('purchaseDialog').showModal();
    requestAnimationFrame(() => el('purchaseSupplier').focus());
  }

  function closePurchaseDialog(){
    if(el('purchaseDialog').open) el('purchaseDialog').close();
  }

  function showPurchaseToast(message){
    const toast = el('purchaseToast');
    toast.textContent = message;
    toast.hidden = false;
    clearTimeout(showPurchaseToast.timer);
    showPurchaseToast.timer = setTimeout(() => { toast.hidden = true; }, 4200);
  }

  async function uploadPurchaseFile(file){
    if(!file) return null;
    const formData = new FormData();
    formData.append('file', file, file.name);
    const response = await fetch('/api/compras/files', {method:'POST', body:formData});
    const data = await response.json();
    if(!response.ok) throw new Error(data.error || 'NÃO FOI POSSÍVEL ENVIAR '+file.name+'.');
    return data.file;
  }

  async function savePurchase(event){
    event.preventDefault();
    const button = el('btnSavePurchase');
    const pageId = el('purchasePageId').value;
    button.disabled = true;
    button.textContent = 'SALVANDO...';
    try{
      const uploads = await Promise.all([
        uploadPurchaseFile(el('purchaseOrderFile').files && el('purchaseOrderFile').files[0]),
        uploadPurchaseFile(el('purchaseInvoiceFile').files && el('purchaseInvoiceFile').files[0])
      ]);
      const payload = {
        fornecedor:el('purchaseSupplier').value.trim(),
        loja:el('purchaseStore').value.trim(),
        responsavelId:el('purchaseResponsible').value,
        dataPedido:el('purchaseOrderDate').value,
        previsao:el('purchaseForecast').value,
        dataRecebimento:el('purchaseReceivedDate').value,
        movimentacaoSistema:el('purchaseSystemDate').value,
        divisao:el('purchaseDivision').value.trim(),
        statusDivisao:el('purchaseDivisionStatus').value,
        status:el('purchaseStatus').value,
        arquivos:{
          pedido:uploads[0] ? [uploads[0]] : [],
          notaFiscal:uploads[1] ? [uploads[1]] : []
        }
      };
      const response = await fetch(pageId ? '/api/compras/'+encodeURIComponent(pageId) : '/api/compras', {
        method:pageId ? 'PATCH' : 'POST',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body:JSON.stringify(payload)
      });
      const data = await response.json();
      if(!response.ok) throw new Error(data.error || 'NÃO FOI POSSÍVEL SALVAR O PEDIDO.');
      closePurchaseDialog();
      showPurchaseToast(pageId ? 'PEDIDO ATUALIZADO NO NOTION.' : 'PEDIDO CRIADO NO NOTION.');
      await loadPurchases(true);
    } catch(error){
      showPurchaseToast(error && error.message ? error.message : 'ERRO AO SALVAR O PEDIDO.');
    } finally {
      button.disabled = false;
      button.textContent = 'SALVAR NO NOTION';
    }
  }

  function renderAll(){
    currentPage = 1;
    filteredRowsCache = null;
    renderSummary();
    renderTopDivergencias();
    renderTable();
    const hasData = merged.length > 0;
    el('btnPdf').disabled = !hasData;
    el('btnCsv').disabled = !hasData;
    el('btnExcel').disabled = !hasData;
  }

  function handleFile(file, kind){
    if(!activeCompanyId || isFiscalSelection(activeCompanyId)){
      showError('Selecione ou adicione uma empresa antes de enviar arquivos.');
      return;
    }
    clearError();
    const reader = new FileReader();
    reader.onload = function(e){
      try{
        const text = e.target.result;
        if(kind === 'entrada'){
          entradaMap = parseEntrada(text);
          currentEntradaFileName = file.name;
          updateDropzoneBadge('entrada', currentEntradaFileName, entradaMap.size);
        } else {
          saidaMap = parseSaida(text);
          currentSaidaFileName = file.name;
          updateDropzoneBadge('saida', currentSaidaFileName, saidaMap.size);
        }
        if(entradaMap.size > 0 || saidaMap.size > 0){
          merged = mergeMaps();
          renderAll();
        }
        persistCompanyData();
      } catch(err){
        showError('Erro ao ler o arquivo de ' + (kind === 'entrada' ? 'entrada' : 'saída') + ': ' + err.message);
      }
    };
    reader.onerror = function(){
      showError('Não foi possível ler o arquivo selecionado.');
    };
    reader.readAsText(file, 'ISO-8859-1');
  }

  function wireDropzone(dzId, inputId, kind){
    const dz = el(dzId);
    const input = el(inputId);
    dz.addEventListener('click', () => {
      if(!activeCompanyId){
        showError('Selecione ou adicione uma empresa antes de enviar arquivos.');
        return;
      }
      input.click();
    });
    input.addEventListener('change', () => {
      if(input.files && input.files[0]) handleFile(input.files[0], kind);
    });
    dz.addEventListener('dragover', e => { e.preventDefault(); if(activeCompanyId) dz.style.borderColor = 'var(--accent)'; });
    dz.addEventListener('dragleave', () => { if(!dz.classList.contains('has-file')) dz.style.borderColor = ''; });
    dz.addEventListener('drop', e => {
      e.preventDefault();
      dz.style.borderColor = '';
      if(e.dataTransfer.files && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0], kind);
    });
  }

  wireDropzone('dzEntrada','fileEntrada','entrada');
  wireDropzone('dzSaida','fileSaida','saida');

  ['filtroNegativos','filtroZeroEntrada','filtroZeroSaida'].forEach(id => {
    el(id).addEventListener('change', () => {
      currentPage = 1;
      filteredRowsCache = null;
      renderTable();
    });
  });
  el('busca').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      currentPage = 1;
      filteredRowsCache = null;
      renderTable();
    }, 120);
  });
  el('mainSort').addEventListener('change', () => {
    currentPage = 1;
    filteredRowsCache = null;
    renderTable();
  });
  el('pageSize').addEventListener('change', event => {
    pageSize = Number(event.target.value) || 100;
    currentPage = 1;
    renderTable();
  });
  el('btnPrevPage').addEventListener('click', () => {
    if(currentPage > 1){
      currentPage--;
      renderTable();
      el('tbody').closest('.table-panel').scrollIntoView({behavior:'smooth', block:'start'});
    }
  });
  el('btnNextPage').addEventListener('click', () => {
    currentPage++;
    renderTable();
    el('tbody').closest('.table-panel').scrollIntoView({behavior:'smooth', block:'start'});
  });

  el('btnLimpar').addEventListener('click', async () => {
    if(activeCompanyId){
      const company = companies.find(c => c.id === activeCompanyId);
      const ok = confirm('Apagar os dados salvos de "' + (company ? company.name : 'empresa') + '"? Esta ação não pode ser desfeita.');
      if(!ok) return;
      if(hasStorage()){
        try{ await storage.delete('estoque:' + activeCompanyId); } catch(e){ /* já pode não existir */ }
      }
      setCompanyMeta('Nenhum dado salvo ainda para esta empresa');
    }
    entradaMap = new Map();
    saidaMap = new Map();
    merged = catalogMap.size > 0 ? mergeMaps() : [];
    resetDropzonesUI();
    ['filtroNegativos','filtroZeroEntrada','filtroZeroSaida'].forEach(id => el(id).checked = false);
    el('busca').value = '';
    el('mainSort').value = 'produto';
    currentPage = 1;
    filteredRowsCache = null;
    clearError();
    renderAll();
  });

  el('companySelectView').addEventListener('change', e => selectCompany(e.target.value));
  el('companySelectData').addEventListener('change', e => selectCompany(e.target.value));
  el('btnAddCompany').addEventListener('click', addCompany);
  el('newCompanyName').addEventListener('keydown', e => { if(e.key === 'Enter') addCompany(); });
  el('btnAddDefaults').addEventListener('click', addDefaultCompanies);
  el('btnIosBackup').addEventListener('click', exportIosBackup);
  el('btnIosRestore').addEventListener('click', () => el('iosRestoreInput').click());
  el('iosRestoreInput').addEventListener('change', event => {
    const file = event.target.files && event.target.files[0];
    if(file) restoreIosBackup(file);
  });
  el('btnDismissIosHint').addEventListener('click', () => {
    el('iosInstallHint').hidden = true;
  });

  el('btnCatalogUpload').addEventListener('click', () => el('fileCatalog').click());
  el('fileCatalog').addEventListener('change', () => {
    if(el('fileCatalog').files && el('fileCatalog').files[0]){
      handleCatalogFile(el('fileCatalog').files[0]);
      el('fileCatalog').value = '';
    }
  });

  el('btnPurchasesRefresh').addEventListener('click', () => loadPurchases(true));
  el('btnPurchasesMore').addEventListener('click', () => loadPurchases(false));
  el('btnNewPurchase').addEventListener('click', () => openPurchaseDialog(null));
  el('btnClosePurchaseDialog').addEventListener('click', closePurchaseDialog);
  el('btnCancelPurchase').addEventListener('click', closePurchaseDialog);
  el('purchaseForm').addEventListener('submit', savePurchase);
  el('purchaseDialog').addEventListener('click', event => {
    if(event.target === el('purchaseDialog')) closePurchaseDialog();
  });
  el('purchaseSearch').addEventListener('input', () => {
    clearTimeout(purchaseSearchTimer);
    purchaseSearchTimer = setTimeout(() => loadPurchases(true), 350);
  });
  el('purchaseStatusFilter').addEventListener('change', event => {
    if(!event.target.matches('input[name="purchaseStatus"]')) return;
    updatePurchaseStatusSummary();
    clearTimeout(purchaseSearchTimer);
    purchaseSearchTimer = setTimeout(() => loadPurchases(true), 120);
  });
  el('btnClearPurchaseStatus').addEventListener('click', () => {
    document.querySelectorAll('input[name="purchaseStatus"]').forEach(input => { input.checked = false; });
    updatePurchaseStatusSummary();
    el('purchaseStatusFilter').open = false;
    loadPurchases(true);
  });
  el('purchaseCardGrid').addEventListener('click', event => {
    const button = event.target.closest('[data-edit-purchase]');
    if(!button) return;
    const item = purchaseRows.find(row => row.id === button.dataset.editPurchase);
    if(item) openPurchaseDialog(item);
  });

  el('pullStoreList').addEventListener('click', event => {
    const button = event.target.closest('[data-pull-company][data-pull-kind]');
    if(!button) return;
    pendingPullUpload = { companyId:button.dataset.pullCompany, kind:button.dataset.pullKind };
    el('pullFileInput').value = '';
    el('pullFileInput').click();
  });
  el('pullFileInput').addEventListener('change', async () => {
    const input = el('pullFileInput');
    if(pendingPullUpload && input.files && input.files[0]){
      const upload = pendingPullUpload;
      pendingPullUpload = null;
      await handlePullFile(input.files[0], upload.companyId, upload.kind);
    }
    input.value = '';
  });
  ['pullMinTransfer'].forEach(id => {
    el(id).addEventListener('change', () => {
      pullTransfers = [];
      pullProductCount = 0;
      pullCalculated = false;
      clearPullError();
      renderPullResults();
      savePullData();
    });
  });
  el('pullSearch').addEventListener('input', () => {
    clearTimeout(pullSearchTimer);
    pullSearchTimer = setTimeout(renderPullResults, 120);
  });
  el('pullGroupFilter').addEventListener('change', renderPullResults);
  el('pullDestinationFilter').addEventListener('change', renderPullResults);
  el('btnCalculatePull').addEventListener('click', calculatePullBalance);
  el('btnClearPullData').addEventListener('click', clearPullData);
  el('btnPullTxt').addEventListener('click', () => {
    const panel = el('pullTxtDownloads');
    panel.hidden = !panel.hidden;
    el('btnPullTxt').setAttribute('aria-expanded', String(!panel.hidden));
    if(!panel.hidden) panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
  el('pullTxtDownloadList').addEventListener('click', event => {
    const button = event.target.closest('[data-pull-txt-index]');
    if(!button) return;
    const route = pullTxtDownloadGroups[Number(button.dataset.pullTxtIndex)];
    if(route) downloadPullTxtRoute(route);
  });
  el('btnPullCsv').addEventListener('click', exportPullCsv);
  el('btnPullExcel').addEventListener('click', exportPullExcel);

  let documentTitleBeforePrint = '';

  el('btnPdf').addEventListener('click', () => {
    const rows = getExportRows();
    const reportTitle = preparePrintReport(rows);
    renderRows(rows);
    documentTitleBeforePrint = document.title;
    document.title = reportTitle;
    document.body.classList.add('pdf-export');
    window.print();
  });

  window.addEventListener('afterprint', () => {
    document.body.classList.remove('pdf-export');
    if(documentTitleBeforePrint){
      document.title = documentTitleBeforePrint;
      documentTitleBeforePrint = '';
    }
    renderTable();
  });

  el('btnCsv').addEventListener('click', () => {
    const rows = getExportRows();
    const header = ['Codigo','Produto','Entrada','Saida','Saldo'];
    const lines = [header.join(';')];
    for(const r of rows){
      lines.push([r.codigo, '"'+r.nome.replace(/"/g,'""')+'"', r.entradaQtd, r.saidaQtd, r.saldo].join(';'));
    }
    const csv = '\uFEFF' + lines.join('\r\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'estoque.csv';
    a.click();
    URL.revokeObjectURL(url);
  });

  el('btnExcel').addEventListener('click', () => {
    if(typeof XLSX === 'undefined'){
      showError('Não foi possível carregar o gerador de Excel (sem conexão). Tente o Baixar CSV.');
      return;
    }
    const rows = getExportRows();
    const data = rows.map(r => ({
      'Código': r.codigo,
      'Produto': r.nome,
      'Entrada': r.entradaQtd,
      'Saída': r.saidaQtd,
      'Saldo': r.saldo
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Estoque');
    XLSX.writeFile(wb, exportFileBase() + '.xlsx');
  });

  async function initializeApp(){
    setDropzonesDisabled(true);
    renderAll();
    await loadCompanies();
    await loadCatalog();
    await loadPullData();
    await verifyIosStorage();
    prepareIosInstallHint();
  }
  registerIosServiceWorker();
  initializeApp();
})();
