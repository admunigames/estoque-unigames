<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover">
<meta name="theme-color" content="#08121e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ESTOQUE">
<meta name="format-detection" content="telephone=no">
<title>ESTOQUE — UNIGAMES</title>
  <link rel="icon" type="image/png" id="appFavicon" href="">
  <link rel="apple-touch-icon" id="appleTouchIcon" href="">
  <link rel="manifest" href="/manifest.webmanifest">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#08121e;
    --bg-card:#101d2b;
    --bg-card-2:#16283b;
    --border:#274561;
    --ink:#f7fbff;
    --ink-soft:#9eb4c9;
    --ink-faint:#5f7890;
    --accent:#4f86bd;
    --accent-deep:#1d487e;
    --accent-ink:#ffffff;
    --neg:#ef6a55;
    --neg-bg:rgba(239,106,85,0.12);
    --ok:#72a7d8;
    --mono:'IBM Plex Mono','SFMono-Regular',Consolas,monospace;
    --sans:'Inter','Segoe UI',Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  [hidden]{display:none !important;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:var(--sans); -webkit-font-smoothing:antialiased;
    font-size:15px;
    background-image: radial-gradient(rgba(255,255,255,0.026) 1px, transparent 1px);
    background-size: 22px 22px; text-transform:none; overscroll-behavior-y:none;
  }
  button, select, option, label, thead th, .lbl, .page-title, .status-pill{ text-transform:uppercase; }
  button, input, select, option{ -webkit-tap-highlight-color:transparent; }
  input, textarea{ text-transform:none; }
  code,.codigo,.num,.saldo,.entrada,.saida,.qty,.company-meta,.pagination-info{font-family:var(--mono);}
  .wrap{max-width:1680px; margin:0 auto; padding:36px 32px calc(76px + env(safe-area-inset-bottom));}

  /* SHELL / MENU LATERAL */
  body.menu-open{overflow:hidden;}
  .shell{min-height:100vh;}
  .sidebar{
    width:min(300px, calc(100vw - 48px));
    background:
      linear-gradient(rgba(79,134,189,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,134,189,0.045) 1px, transparent 1px),
      radial-gradient(circle at 12% 4%, rgba(79,134,189,0.2), transparent 34%),
      linear-gradient(160deg, #12243a 0%, #08121e 72%);
    background-size:24px 24px, 24px 24px, auto, auto;
    border-right:1px solid rgba(79,134,189,0.48);
    padding:calc(26px + env(safe-area-inset-top)) 18px calc(26px + env(safe-area-inset-bottom)); display:flex; flex-direction:column; gap:6px;
    position:fixed; inset:0 auto 0 0; height:100vh; overflow-y:auto; z-index:1000;
    transform:translateX(-102%); visibility:hidden;
    box-shadow:24px 0 64px rgba(0,0,0,0.52), inset -1px 0 rgba(79,134,189,0.12);
    transition:transform .24s ease, visibility 0s linear .24s;
  }
  .sidebar::before{
    content:''; position:absolute; inset:0 0 auto; height:2px;
    background:linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow:0 0 18px rgba(79,134,189,0.75); pointer-events:none;
  }
  .sidebar::after{
    content:''; position:absolute; top:0; right:0; width:1px; height:100%;
    background:linear-gradient(transparent, var(--accent), transparent); opacity:.45; pointer-events:none;
  }
  body.menu-open .sidebar{transform:translateX(0); visibility:visible; transition-delay:0s;}
  .sidebar-brand{
    display:flex; align-items:center; gap:12px; position:relative;
    color:var(--ink); margin:48px 0 14px; padding:12px;
    background:rgba(255,255,255,0.028); border:1px solid rgba(79,134,189,0.2); border-radius:14px;
  }
  .brand-logo{
    width:44px; height:44px; flex:0 0 44px; object-fit:contain; padding:2px;
    border-radius:11px; background:#fff; border:1px solid rgba(118,166,211,0.72);
    box-shadow:0 0 22px rgba(79,134,189,0.22);
  }
  .brand-copy{display:flex; flex-direction:column; min-width:0;}
  .brand-copy strong{font-family:var(--sans); font-size:16px; font-weight:800; letter-spacing:.2px; white-space:nowrap;}
  .brand-copy small{color:var(--ink-soft); font-family:var(--sans); font-size:9px; letter-spacing:.7px; margin-top:3px;}
  .sidebar-compact-toggle{
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%; min-height:34px;
    margin:0 0 8px; padding:7px 10px; border:0; border-radius:8px; background:transparent;
    color:var(--ink-faint); font:700 9px/1 var(--sans); letter-spacing:.5px;
  }
  .sidebar-compact-toggle:hover{opacity:1; color:var(--ink); background:rgba(255,255,255,.04);}
  .nav-item{
    display:flex; align-items:center; gap:11px; position:relative; overflow:hidden;
    background:transparent; border:1px solid transparent; color:var(--ink-soft);
    text-align:left; padding:11px 12px; border-radius:10px; font-size:12.5px; font-weight:700;
    cursor:pointer; width:100%; font-family:var(--sans); letter-spacing:.1px;
  }
  .nav-icon{
    width:25px; height:25px; flex:0 0 25px; display:grid; place-items:center; border-radius:8px;
    background:rgba(79,134,189,.09); color:var(--accent); font:800 14px/1 var(--mono);
  }
  .nav-label{min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .nav-item:hover{background:rgba(79,134,189,0.08); color:var(--ink); opacity:1;}
  .nav-item.active{
    background:linear-gradient(90deg, rgba(29,72,126,.86), rgba(79,134,189,.48));
    border-color:rgba(114,167,216,.42); color:var(--accent-ink);
    box-shadow:0 10px 24px rgba(0,0,0,.2), inset 3px 0 var(--accent), inset 0 1px rgba(255,255,255,.12);
  }
  .nav-item.active .nav-icon{background:rgba(255,255,255,.14); color:#fff; box-shadow:0 0 16px rgba(114,167,216,.3);}
  .nav-group{display:flex; flex-direction:column; gap:5px;}
  .nav-group-toggle{
    display:flex; align-items:center; gap:11px; width:100%; padding:10px 12px;
    border:1px solid transparent; border-radius:10px; background:transparent; color:var(--ink-soft); font-family:var(--sans);
    font-size:12.5px; font-weight:700; letter-spacing:.1px; text-transform:uppercase;
  }
  .nav-group-toggle:hover{opacity:1; color:var(--ink); background:rgba(79,134,189,.08);}
  .nav-group-toggle.active{
    color:var(--accent-ink); border-color:rgba(114,167,216,.42);
    background:linear-gradient(90deg,rgba(29,72,126,.86),rgba(79,134,189,.48));
    box-shadow:0 10px 24px rgba(0,0,0,.2),inset 3px 0 var(--accent);
  }
  .nav-group-toggle .nav-label{flex:1; text-align:left;}
  .nav-group-chevron{font-size:13px; transition:transform .22s ease;}
  .nav-group-toggle[aria-expanded="false"] .nav-group-chevron{transform:rotate(-90deg);}
  .nav-submenu{
    display:flex; flex-direction:column; gap:4px; max-height:0; opacity:0; overflow:hidden;
    transform:translateY(-6px); transition:max-height .24s ease,opacity .18s ease,transform .24s ease;
  }
  .nav-group-toggle[aria-expanded="true"] + .nav-submenu{max-height:150px; opacity:1; transform:translateY(0);}
  .nav-item.sub-item{position:relative; padding-left:25px;}
  body.sidebar-compact .sidebar{width:92px;}
  body.sidebar-compact .sidebar-brand{justify-content:center;}
  body.sidebar-compact .brand-copy,
  body.sidebar-compact .compact-label,
  body.sidebar-compact .nav-label,
  body.sidebar-compact .nav-group-chevron,
  body.sidebar-compact .ios-storage-box,
  body.sidebar-compact .sidebar-status span:last-child{display:none;}
  body.sidebar-compact .nav-item,
  body.sidebar-compact .nav-group-toggle{justify-content:center; padding-inline:10px;}
  body.sidebar-compact .nav-item.sub-item{padding-left:10px;}
  body.sidebar-compact .logout-button{font-size:0; text-align:center;}
  body.sidebar-compact .logout-button::before{content:'↪'; font:800 18px/1 var(--mono);}
  .sidebar-status{
    display:flex; align-items:center; gap:10px; padding:10px 10px 4px;
    color:var(--ink-soft); font-family:var(--mono); font-size:9px; letter-spacing:.7px;
  }
  .logout-form{margin-top:12px;}
  .logout-button{
    width:100%; padding:10px 12px; border-radius:9px; cursor:pointer;
    border:1px solid rgba(255,116,116,.3); background:rgba(126,28,28,.12);
    color:#ffc4c4; font-family:var(--mono); font-size:10px; font-weight:800;
    letter-spacing:.55px; text-align:left;
  }
  .logout-button:hover{border-color:rgba(255,116,116,.65); background:rgba(126,28,28,.24);}
  .ios-storage-box{
    margin-top:auto; padding:12px; border:1px solid rgba(79,134,189,.34); border-radius:11px;
    background:rgba(8,18,30,.58); box-shadow:inset 0 1px rgba(255,255,255,.035);
  }
  .ios-storage-box strong{display:block; color:var(--ink); font:700 10px/1.4 var(--mono); letter-spacing:.6px;}
  .ios-storage-box p{margin:5px 0 10px; color:var(--ink-soft); font:9px/1.45 var(--mono);}
  .ios-storage-actions{display:grid; grid-template-columns:1fr 1fr; gap:7px;}
  .ios-storage-actions button{
    min-height:38px; padding:7px 8px; border-radius:8px; border:1px solid rgba(79,134,189,.42);
    background:rgba(79,134,189,.1); color:var(--ink); font:700 8.5px/1.25 var(--mono); cursor:pointer;
  }
  .ios-storage-actions button:active{transform:scale(.98);}
  .ios-install-hint{
    position:fixed; z-index:1200; left:max(12px,env(safe-area-inset-left)); right:max(12px,env(safe-area-inset-right));
    bottom:calc(12px + env(safe-area-inset-bottom)); display:flex; align-items:center; gap:12px;
    max-width:680px; margin:auto; padding:12px 14px; border:1px solid rgba(114,167,216,.65); border-radius:12px;
    background:rgba(16,29,43,.97); box-shadow:0 18px 46px rgba(0,0,0,.48); color:var(--ink-soft);
    font:10px/1.45 var(--mono);
  }
  .ios-install-hint b{color:var(--ink);}
  .ios-install-hint button{margin-left:auto; flex:0 0 auto; min-height:36px; padding:7px 12px;}
  .status-pulse{
    width:8px; height:8px; border-radius:50%; background:var(--ok);
    box-shadow:0 0 0 4px rgba(84,196,138,0.09), 0 0 12px rgba(84,196,138,0.7);
  }
  .menu-toggle{
    position:fixed; top:calc(16px + env(safe-area-inset-top)); left:calc(16px + env(safe-area-inset-left)); z-index:1100; width:44px; height:44px;
    display:grid; place-items:center; padding:0; border:1px solid var(--border); border-radius:11px;
    background:linear-gradient(145deg, #20262b, #14181c); color:var(--ink);
    box-shadow:0 8px 22px rgba(0,0,0,0.36), 0 0 0 1px rgba(79,134,189,0.1);
  }
  .menu-toggle:hover{opacity:1; border-color:rgba(79,134,189,0.75);}
  .menu-toggle-icon{display:flex; flex-direction:column; gap:4px; width:18px;}
  .menu-toggle-icon span{
    display:block; width:100%; height:2px; border-radius:2px; background:currentColor;
    transform-origin:center; transition:transform .2s ease, opacity .2s ease;
  }
  body.menu-open .menu-toggle-icon span:nth-child(1){transform:translateY(6px) rotate(45deg);}
  body.menu-open .menu-toggle-icon span:nth-child(2){opacity:0;}
  body.menu-open .menu-toggle-icon span:nth-child(3){transform:translateY(-6px) rotate(-45deg);}
  body.home-active .menu-toggle{display:none;}
  .sidebar-backdrop{
    position:fixed; inset:0; z-index:900; padding:0; border:0; border-radius:0;
    background:rgba(5,7,9,0.68); opacity:0; visibility:hidden; pointer-events:none;
    transition:opacity .24s ease, visibility 0s linear .24s;
  }
  body.menu-open .sidebar-backdrop{opacity:1; visibility:visible; pointer-events:auto; transition-delay:0s;}
  .content{width:100%; min-width:0;}
  .page{display:none;}
  .page.active{display:block;}
  .page-header{margin-bottom:24px;}
  .page-heading{
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    min-height:58px; padding-left:62px; margin-bottom:10px;
  }
  .page-title{
    min-width:0; margin:0 0 0 auto; font-size:clamp(24px,2.5vw,34px); font-weight:800; color:var(--ink); font-family:var(--sans);
    letter-spacing:-.6px; text-align:right; overflow-wrap:anywhere;
  }
  .page-logo{
    position:relative; isolation:isolate; flex:0 0 clamp(46px,4.3vw,56px);
    display:grid; place-items:center; width:clamp(46px,4.3vw,56px); height:clamp(46px,4.3vw,56px);
    min-height:0; padding:5px; overflow:hidden; border:1px solid rgba(114,167,216,.62); border-radius:16px;
    background:
      radial-gradient(circle at 28% 16%,rgba(255,255,255,.18),transparent 36%),
      linear-gradient(145deg,rgba(79,134,189,.34),rgba(8,18,30,.9));
    box-shadow:0 10px 28px rgba(0,0,0,.34),inset 0 1px rgba(255,255,255,.16),0 0 24px rgba(79,134,189,.13);
    cursor:pointer; transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease;
  }
  .page-logo::after{
    content:''; position:absolute; inset:auto -35% -58% 18%; height:70%; z-index:-1;
    background:radial-gradient(circle,rgba(114,167,216,.42),transparent 68%); pointer-events:none;
  }
  .page-logo:hover{
    opacity:1; transform:translateY(-2px) scale(1.02); border-color:rgba(157,207,252,.92);
    box-shadow:0 14px 34px rgba(0,0,0,.4),0 0 28px rgba(79,134,189,.24),inset 0 1px rgba(255,255,255,.2);
  }
  .page-logo:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}
  .page-logo .brand-logo{width:100%; height:100%; object-fit:contain; border-radius:11px; padding:1px; background:rgba(255,255,255,.96);}
  .page-header-meta{display:flex; align-items:flex-end; justify-content:space-between; gap:18px; padding-left:62px;}
  .page-desc{max-width:880px; font-size:15px; color:var(--ink-soft); margin:0; line-height:1.6; text-transform:none;}
  .page-header-actions{display:flex; align-items:center; justify-content:flex-end; gap:9px; flex-wrap:wrap; flex:0 0 auto;}

  /* INÍCIO / CENTRAL LIGHTGLASS */
  .home-page{
    min-height:100vh; align-items:center; justify-content:center;
    padding-top:max(52px,calc(36px + env(safe-area-inset-top)));
  }
  .page.home-page.active{display:flex;}
  .home-lightglass{
    position:relative; isolation:isolate; width:min(1160px,100%); overflow:hidden;
    padding:clamp(32px,6vw,76px); border:1px solid rgba(255,255,255,.78); border-radius:32px;
    background:
      radial-gradient(circle at 12% 0%,rgba(255,255,255,.98),transparent 42%),
      radial-gradient(circle at 92% 18%,rgba(114,167,216,.34),transparent 34%),
      linear-gradient(145deg,rgba(247,251,255,.95),rgba(214,230,245,.84));
    box-shadow:0 28px 90px rgba(0,0,0,.38),inset 0 1px 0 rgba(255,255,255,.96);
    color:#10233a; text-align:center; backdrop-filter:blur(22px) saturate(140%);
  }
  .home-lightglass::before{
    content:''; position:absolute; z-index:-1; width:320px; height:320px; border-radius:50%;
    left:-130px; bottom:-180px; background:rgba(79,134,189,.2); filter:blur(3px);
  }
  .home-lightglass::after{
    content:''; position:absolute; z-index:-1; inset:0;
    background:linear-gradient(115deg,rgba(255,255,255,.42),transparent 36%,r
